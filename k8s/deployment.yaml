# k8s/deployment.yaml
# Tells Kubernetes HOW to run your app and how many copies (replicas) to keep alive

apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  labels:
    app: flask-app
spec:
  replicas: 2               # Run 2 pods — if one crashes, the other keeps serving traffic
  selector:
    matchLabels:
      app: flask-app        # Must match the labels in the pod template below

  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          # Jenkins replaces IMAGE_PLACEHOLDER with the real image:tag at deploy time
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Always   # Always pull the latest version from the registry
          ports:
            - containerPort: 5000